name: Cadastrar
description: ''
endpoints:
  -
    httpMethods:
      - POST
    uri: api/register
    metadata:
      groupName: Cadastrar
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: |-
        Registrar novo usuário

        Este endpoint cria um novo usuário e retorna um token de autenticação.
      description: ''
      authenticated: false
      deprecated: false
      custom: []
    headers:
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      name:
        name: name
        description: 'Nome completo do usuário (máximo 100 caracteres). O campo value não pode ser superior a 100 caracteres.'
        required: true
        example: 'João da Silva'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      email:
        name: email
        description: 'E-mail válido e único. O campo value deve ser um endereço de e-mail válido.'
        required: true
        example: joao@email.com
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      password:
        name: password
        description: 'Senha com no mínimo 8 caracteres, contendo ao menos uma letra maiúscula, uma minúscula, um número e um caractere especial. Must match the regex /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*#?&^()\-_=+])[A-Za-z\d@$!%*#?&^()\-_=+]{8,}$/. O campo value deve ter pelo menos 8 caracteres.'
        required: true
        example: SenhaForte@123
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      date_birth:
        name: date_birth
        description: 'Data de nascimento no formato YYYY-MM-DD. Deve ser anterior ou igual à data atual menos 18 anos. O campo value deve ser uma data válida. O campo value deve ser uma data anterior ou igual a <code>2007-08-25</code>.'
        required: true
        example: '1990-05-21'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanBodyParameters:
      name: 'João da Silva'
      email: joao@email.com
      password: SenhaForte@123
      date_birth: '1990-05-21'
    fileParameters: []
    responses:
      -
        status: 201
        content: |-
          {
            "user": {
              "id": 1,
              "name": "João da Silva",
              "email": "joao@email.com",
              "date_birth": "1990-05-21",
              "created_at": "2025-07-10T20:00:00.000000Z",
              "updated_at": "2025-07-10T20:00:00.000000Z"
            },
            "token": "1|abc123def456..."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "message": "The given data was invalid.",
            "errors": {
              "password": [
                "A senha deve conter pelo menos uma letra maiúscula, uma minúscula, um número e um caractere especial.",
                "A confirmação da senha não corresponde."
              ]
            }
          }
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth: []
    controller: null
    method: null
    route: null
    custom: []
