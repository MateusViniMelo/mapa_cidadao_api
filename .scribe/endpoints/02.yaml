  -
    httpMethods:
      - POST
    uri: api/ocurrences
    metadata:
      groupName: Ocorrências
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: |-
        Registrar nova ocorrência

        Este endpoint permite que usuários autenticados registrem uma nova ocorrência no sistema.
      description: ''
      authenticated: true
      deprecated: false
      custom: []
    headers:
      Authorization: 'Bearer Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      location:
        name: location
        description: 'Coordenadas geográficas no formato GeoJSON Point.'
        required: true
        example:
          type: Point
          coordinates:
            - -15.7801
            - -47.9292
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      type_id:
        name: type_id
        description: 'ID do tipo de ocorrência existente. The <code>id</code> of an existing record in the types_ocurrence table.'
        required: true
        example: 2
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      description:
        name: description
        description: 'Descrição do problema (opcional, até 250 caracteres). O campo value não pode ser superior a 250 caracteres.'
        required: false
        example: 'Buraco na rua dificultando o tráfego'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      address_name:
        name: address_name
        description: 'Endereço descritivo da ocorrência. O campo value não pode ser superior a 500 caracteres.'
        required: true
        example: 'Rua das Palmeiras, 123'
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      city:
        name: city
        description: 'Cidade da ocorrência. O campo value não pode ser superior a 250 caracteres.'
        required: false
        example: Belém
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      state:
        name: state
        description: 'Estado da ocorrência. O campo value não pode ser superior a 250 caracteres.'
        required: false
        example: PA
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
      country:
        name: country
        description: 'País da ocorrência. O campo value não pode ser superior a 250 caracteres.'
        required: false
        example: Brasil
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: true
        custom: []
    cleanBodyParameters:
      location:
        type: Point
        coordinates:
          - -15.7801
          - -47.9292
      type_id: 2
      description: 'Buraco na rua dificultando o tráfego'
      address_name: 'Rua das Palmeiras, 123'
      city: Belém
      state: PA
      country: Brasil
    fileParameters: []
    responses:
      -
        status: 201
        content: |-
          {
            "ocurrence": {
              "id": 1,
              "type_id": 2,
              "user_id": 8,
              "description": "Buraco na rua dificultando o tráfego",
              "location": {
                "type": "Point",
                "coordinates": [-15.7801, -47.9292]
              },
              "address_name": "Rua das Palmeiras, 123",
              "city": "Belém",
              "state": "PA",
              "country": "Brasil",
              "is_active": true,
              "created_at": "2025-07-10T20:30:00.000000Z",
              "updated_at": "2025-07-10T20:30:00.000000Z"
            }
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "message": "The given data was invalid.",
            "errors": {
              "type_id": ["O tipo informado não existe."],
              "location": ["O campo location deve ser um ponto GeoJSON válido."]
            }
          }
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer Bearer {token-aqui}'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - POST
    uri: 'api/ocurrences/inactivate/{ocurrence_id}'
    metadata:
      groupName: Ocorrências
      groupDescription: ''
      subgroup: ''
      subgroupDescription: ''
      title: |-
        Inativar ocorrência

        Este endpoint permite que um usuário autenticado inative uma ocorrência que ele mesmo registrou.
        A ocorrência não é removida do banco, apenas marcada como inativa.
      description: ''
      authenticated: true
      deprecated: false
      custom: []
    headers:
      Authorization: 'Bearer Bearer {YOUR_AUTH_TOKEN}'
      Content-Type: application/json
      Accept: application/json
    urlParameters:
      ocurrence_id:
        name: ocurrence_id
        description: 'The ID of the ocurrence.'
        required: true
        example: 16
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      ocurrence:
        name: ocurrence
        description: 'O ID da ocorrência que será inativada. Exemplo: 1'
        required: true
        example: 16
        type: integer
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanUrlParameters:
      ocurrence_id: 16
      ocurrence: 16
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      type_closure:
        name: type_closure
        description: |-
          Tipo de encerramento da ocorrência.
          Valores aceitos:
          - resolved → Ocorrência resolvida
          - mistake → Ocorrência criada por engano
          Exemplo: "resolved"
        required: true
        example: architecto
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
      solution_description:
        name: solution_description
        description: |-
          Condicional. Obrigatório se o type_closure for "resolved".
          Máximo de 500 caracteres.
          Exemplo: "Problema resolvido pela companhia responsável."
        required: false
        example: architecto
        type: string
        enumValues: []
        exampleWasSpecified: false
        nullable: false
        custom: []
    cleanBodyParameters:
      type_closure: architecto
      solution_description: architecto
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "message": "Ocorrência inativada com sucesso."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 403
        content: |-
          {
            "message": "Você não tem permissão para inativar esta ocorrência."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "message": "Ocorrência já inativada."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "message": "Não foi possível inativar a ocorrência."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: |-
          {
            "message": "The given data was invalid.",
            "errors": {
              "type_closure": ["O campo type_closure é obrigatório."],
              "solution_description": ["O campo solution_description é obrigatório quando type_closure é resolved."]
            }
          }
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer Bearer {token-aqui}'
    controller: null
    method: null
    route: null
    custom: []
